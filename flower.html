<!DOCTYPE html>
<html>

<head>

<title>bad nazar h meri apce upar🥺 bachke🙈</title>

<style>

body{

margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(#ffc1d6,#fff);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;

}


/* floating flowers */

.flower{

position:absolute;
font-size:40px;
animation:float 6s infinite ease-in-out;

}


@keyframes float{

0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-20vh) rotate(360deg);
opacity:0;
}

}



/* centre cat */

.cat{

font-size:130px;
position:relative;
z-index:5;

animation:bounce 2s infinite alternate;

}


@keyframes bounce{

from{
transform:translateY(0);
}

to{
transform:translateY(-15px);
}

}



/* note */

.note{

position:absolute;

top:55px;
left:50%;

transform:translateX(-50%);

background:white;

padding:20px 30px;

border-radius:20px;

font-size:22px;

box-shadow:0 0 20px pink;

font-weight:bold;

}


</style>


</head>


<body>


<div class="note">

HI CUTIE ❤️<br>
I LIKE YOU TOO 🌸

</div>



<div class="cat">

🐱<br>

💌

</div>



<script>


let flowers=["🌸","🌹","🌷","🌺","🌻"];


for(let i=0;i<50;i++){


let f=document.createElement("div");

f.className="flower";


f.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];


f.style.left=Math.random()*100+"vw";


f.style.animationDelay=Math.random()*5+"s";


f.style.fontSize=(20+Math.random()*40)+"px";


document.body.appendChild(f);


}



</script>



</body>

</html>
