<!DOCTYPE html>

<html>

<head>

<title>yelo babeyy😍🤭🌸</title>

<link rel="stylesheet" href="style.css">

<style>


body{

background:#111;

overflow:hidden;

}


.flower{

position:relative;

width:100px;

height:100px;

margin:auto;

top:150px;

animation:bloom 3s infinite alternate;

}



.petal{

position:absolute;

width:80px;

height:80px;

background:pink;

border-radius:50%;

}



.p1{left:0;top:0;}
.p2{right:0;top:0;}
.p3{left:0;bottom:0;}
.p4{right:0;bottom:0;}


.center{

position:absolute;

width:60px;
height:60px;

background:yellow;

border-radius:50%;

left:20px;
top:20px;

}



@keyframes bloom{


from{

transform:scale(0.3) rotate(0deg);

}


to{

transform:scale(1.5) rotate(360deg);

}


}


h1{

text-align:center;

color:white;

margin-top:250px;

font-size:40px;

}

</style>


</head>


<body>


<h1>🌸 I KNEW IT ❤️</h1>


<div class="flower">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>

<div class="center"></div>


</div>


</body>

</html>
